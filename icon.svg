<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e0b1a"/>
      <stop offset="1" stop-color="#07060d"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- full-bleed background (maskable safe) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="96" fill="none" stroke="#2a2147" stroke-width="4"/>

  <!-- candlesticks: rising trend, content kept within central safe zone -->
  <g filter="url(#glow)" stroke-linecap="round">
    <!-- down candle (red) -->
    <line x1="168" y1="300" x2="168" y2="380" stroke="#ff3b6b" stroke-width="10"/>
    <rect x="152" y="318" width="32" height="48" rx="6" fill="#ff3b6b"/>

    <!-- up candle (lime) -->
    <line x1="256" y1="150" x2="256" y2="360" stroke="#b6ff3c" stroke-width="10"/>
    <rect x="240" y="190" width="32" height="120" rx="6" fill="#b6ff3c"/>

    <!-- up candle (cyan) -->
    <line x1="344" y1="120" x2="344" y2="300" stroke="#19f0ff" stroke-width="10"/>
    <rect x="328" y="150" width="32" height="96" rx="6" fill="#19f0ff"/>
  </g>

  <!-- magenta strike line (options) -->
  <line x1="128" y1="252" x2="384" y2="252" stroke="#ff2e88" stroke-width="5" stroke-dasharray="14 12" opacity="0.9"/>
</svg>
